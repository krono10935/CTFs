name: Build CTF1 installer
on:
  push:
    tags: ['ctf1-v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: CTF1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: pyinstaller KronoCTF.spec
      - run: choco install innosetup -y
      - run: iscc installer\KronoCTF.iss
      - name: Publish release + refresh ctf1-latest
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          A=installer/Output/KronoCTF-Setup.exe
          gh release create "$GITHUB_REF_NAME" "$A" --title "CTF1 — $GITHUB_REF_NAME" --notes "KronoCTF installer" \
            || gh release upload "$GITHUB_REF_NAME" "$A" --clobber
          gh release view ctf1-latest >/dev/null 2>&1 \
            || gh release create ctf1-latest --title "CTF1 — latest" --notes "Always the newest CTF1 installer."
          gh release upload ctf1-latest "$A" --clobber